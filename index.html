<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Security Hackathon 2026 | Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top navbar-glass">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html"><span style="color: var(--neon-cyan);">CYBER</span>QUEST</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="about.html">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="portfolio.html">Challenges</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>  
    <main id="content-area">
        <section class="py-5 text-center d-flex flex-column justify-content-center" style="min-height: 70vh;">
            <h2 class="display-3 fw-bold" style="color: var(--neon-cyan);">CYBER-SECURITY 2026</h2>
            <p class="lead">Join the elite ethical hackers.</p>
            <img src="assets/img/Computer.jpg" alt="High-tech cyberpunk computer setup" class="img-fluid rounded mb-4 d-block mx-auto" style="max-width: 300px; border: 2px solid var(--cyber-purple); box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);">
                
                <div>
                    <button class="btn btn-lg fw-bold shadow-lg px-5 py-3" style="background-color: var(--cyber-purple); color: white;" data-bs-toggle="modal" data-bs-target="#regModal">REGISTER NOW</button>
                </div>
            </div>
        </section>
        <div class="modal fade" id="regModal" tabindex="-1" aria-labelledby="regModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content bg-dark border-info">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title" id="regModalLabel" style="color: var(--neon-cyan);">Hackathon Registration</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-4">
                        <form action="#" method="get">
                            <div class="mb-3">
                                <label for="userName" class="form-label text-light">Full Name</label>
                                <input type="text" class="form-control" id="userName" placeholder="Enter your full name" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn fw-bold" style="background-color: var(--cyber-purple); color: white;">Submit Application</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="text-center py-4 mt-5" style="border-top: 1px solid var(--cyber-purple);">
        <p>&copy; 2026 Hackathon Assessment</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
